<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organic Connect | Premium Marketplace</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>
    <div id="toast-container"></div>

    <nav class="glass-nav">
        <div class="nav-container">
            <a href="#" class="logo" onclick="app.navigate('home')">Organic Connect</a>
            <ul class="nav-links">
                <li><a href="#" id="link-home" onclick="app.navigate('home')">Home</a></li>
                <li><a href="#" id="link-market" onclick="app.navigate('market')">Market</a></li>
                <li><a href="#" id="link-explore" onclick="app.navigate('explore')">Explore</a></li>
            </ul>
            <div class="nav-actions">
                <div class="cart-icon" onclick="app.toggleCart()">
                    🛒<span id="cart-count" class="cart-count">0</span>
                </div>
                <button class="btn-signin" onclick="app.navigate('login')">Sign In</button>
            </div>
        </div>
    </nav>

    <main>
        <!-- SEARCH SECTION -->
        <section class="search-section">
            <h1 style="margin-bottom: 2rem; font-size: 2.5rem;">Freshness Delivered.</h1>
            <div class="search-box">
                <input type="text" id="searchBar" class="search-input" placeholder="Search fresh produce..." onkeyup="app.fetchProducts()">
                <select id="categoryFilter" class="category-filter" onchange="app.fetchProducts()">
                    <option value="All">All Categories</option>
                    <option value="Fruits">Fruits</option>
                    <option value="Vegetables">Vegetables</option>
                    <option value="Dairy">Dairy</option>
                    <option value="Grains">Grains</option>
                </select>
            </div>
        </section>

        <!-- MARKET SECTION -->
        <div id="market-content">
            <div id="category-groups"></div>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
